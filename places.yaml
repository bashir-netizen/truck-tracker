# Place label overrides. Each entry relabels the nearest detected place within
# 300 m of these coordinates. Committed so the scheduled cloud job applies them.
# After editing, re-run `python -m enrich.run` (or wait for the hourly job).
#
# `depot: true` (or `home: true`) tags that place as a depot on the Overview,
# regardless of journey patterns. Places without the flag fall back to a
# "most-frequent journey origin = depot" heuristic.
#
# `type:` classifies the place so the round-trip view treats it correctly.
# Valid types:
#   depot       home base; round trips start and end here (implied by depot/home)
#   destination a real delivery/pickup endpoint (the default if omitted)
#   transit     a roadside pass-through (fuel, rest); never a primary destination
#   customer    a named customer site (counts as a destination)
#   workshop    a service/repair stop (counts as a destination)
# Backward compatible: no `type:` => "depot" when depot/home is set, else
# "destination". Mark a roadside cluster `type: transit` to keep it out of the
# destination list, e.g.:
#   - label: <roadside name> (A104)
#     lat: <lat>
#     lon: <lon>
#     type: transit
#
# `type_confidence:` (high|medium|low; default low) and `type_reasoning:` (free text) record how
# sure you are of the type. A low-confidence label that disagrees with the detector's pattern
# analysis is surfaced on the Map's "Labels that may need review" panel; high-confidence labels
# override the detector silently.

- label: Nairobi yard (Mugumoini)
  lat: -1.332095
  lon: 36.872111
  type: depot
  home: true
  type_confidence: high
  type_reasoning: "Confirmed by Genwatt May 2026: real home base at Mugumoini, Nairobi (near the ICD); overnight parks and stages between runs."

